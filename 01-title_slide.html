<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashFix — Investor Presentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0A192F;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-top: 80px;
            padding-left: 80px;
            padding-right: 80px;
            padding-bottom: 80px;
            position: relative;
            border-left: 3px solid #FF8C00;
        }

        .title-main {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 88px;
            font-weight: 900;
            color: #E6F1FF;
            line-height: 1;
            margin-bottom: 12px;
            letter-spacing: -2px;
        }

        .title-accent {
            color: #FF8C00;
        }

        .subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #8892B0;
            line-height: 1.4;
            margin-bottom: 40px;
            max-width: 700px;
        }

        .tagline {
            font-family: 'DM Sans', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: #FF8C00;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .bottom-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 400;
            color: #8892B0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: #FF8C00;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div>
            <div class="divider"></div>
            <h1 class="title-main">Flash<span class="title-accent">Fix</span></h1>
            <p class="subtitle">The Operating System for Property Turnover</p>
            <p class="tagline">Turning units faster. Getting paid sooner.</p>
        </div>
        <div>
            <p class="bottom-text">From vacant to rent-ready in 48 hours</p>
        </div>
    </div>
</body>
</html>
